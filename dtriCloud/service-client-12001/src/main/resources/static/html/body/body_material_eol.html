<style>
    .nav-item .active {
        box-shadow: 0 -.125rem .25rem rgba(0, 0, 0, .075) !important;
    }
</style>

<div class="text-center text-ms col-md pt-4 mt-4" id="body_material_eol">
    <div class="p-1">
        <ul class="nav nav-tabs lh-1 shadow-sm justify-content-center" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button id="other_search_title" class="nav-link p-1 active" data-bs-toggle="tab"
                    data-bs-target="#search_tab" type="button" role="tab">
                    <i class="bi bi-calculator"></i> Search
                </button>
            </li>
        </ul>
        <div class="tab-content border border-gray rounded-bottom bg-white" id="myTabContent">
            <div class="tab-pane fade show active p-2" id="search_tab" role="tabpanel">search_tab Loading...!!</div>
        </div>
    </div>
</div>

<script type="text/javascript">
    body_index = {
        date: {},
        methods: {
            create() {
                console.log("body_material_eol.html(created)");
                // 預設分頁 active
                $("#body_material_eol #other_search_title").addClass("active");
                $("#body_material_eol #search_tab").addClass("show active");

                // 載入客製化模板
                $("#body_material_eol #search_tab").load(
                    "./html/other/other_material_eol.html",
                    function () {
                        if (typeof materialEolPage !== "undefined") {
                            materialEolPage.create();
                        }
                    }
                );
            },
            destroy() {
                console.log("body_material_eol.html(destroy)");
                if (typeof materialEolPage !== "undefined") {
                    materialEolPage.destroy();
                }
            }
        }
    };
</script>
