<style>
    .tab-pane {
        min-height: calc(100vh - 125px);
    }

    .nav-item .active {
        box-shadow: 0 -.125rem .25rem rgba(0, 0, 0, .075) !important;
    }
</style>

<div class="text-center text-ms col-md pt-4 mt-4" id="body_material_virtual_project">
    <div class="p-1">
        <ul class="nav nav-tabs lh-1 shadow-sm justify-content-center" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button id="other_search_title" class="nav-link p-1" data-bs-toggle="tab" data-bs-target="#search_tab"
                    type="button" role="tab">
                    <i class="bi bi-search-heart"></i> Search
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button id="other_modify_title" class="nav-link p-1" data-bs-toggle="tab" data-bs-target="#modify_tab"
                    type="button" role="tab">
                    <i class="bi bi-pen"></i> Execution
                </button>
            </li>
        </ul>
        <div class="tab-content border border-gray rounded-bottom bg-white" id="myTabContent">
            <div class="tab-pane fade" id="search_tab" role="tabpanel">search_tab Loading...!!</div>
            <div class="tab-pane fade" id="modify_tab" role="tabpanel">modify_tab Loading...!!</div>
        </div>
    </div>
</div>
<script type="text/javascript">
    body_index = {
        date: {},
        methods: {
            create() {
                console.log("body_material_virtual_project.html(created)");
                // 預設分頁 active
                $("#body_material_virtual_project #other_search_title").addClass("active");
                $("#body_material_virtual_project #search_tab").addClass("show active");

                // 載入客製化模板
                $("#body_material_virtual_project #search_tab").load(
                    "./html/other/other_material_virtual_project.html",
                    function () {
                        if (typeof mvpPage !== "undefined") {
                            mvpPage.create();
                        }
                    }
                );
            },
            destroy() {
                console.log("body_material_virtual_project(destroy)");
            }
        }
    };
</script>
