			datetimepickerDate() {

					//minView:1,

					datesDisabled: '+1d',

					startView: 1,
					minuteStep: 30,
					pickDate: false,

			},
			// 渲染訊息片段
			renderMessage(msg) {
			    console.log("renderMessage()");
			    let alignment = msg.role === 'USER' ? 'ms-auto bg-primary text-white' : 'me-auto bg-white border';
			    
			    // 1. 將 Markdown 轉換成 HTML
			    let formattedContent = (msg.role === 'ASSISTANT') ? marked.parse(msg.acmcontent) : msg.acmcontent;
			    
			    // 🌟 新增：偵測是否有表格，如果有則加上下載按鈕
			    let downloadBtnHtml = "";
			    if (msg.role === 'ASSISTANT' && formattedContent.includes("<table")) {
			        // 產生一個隨機 ID 方便定位這個表格
			        let tableId = "table_" + Math.random().toString(36).substr(2, 9);
			        
			        // 在 HTML 中注入 ID (利用取代的方式)
			        formattedContent = formattedContent.replace("<table", `<table id="${tableId}"`);
			        
			        // 下載按鈕的 HTML
			        downloadBtnHtml = `
			            <div class="mt-2 mb-2 text-end">
			                <button class="btn btn-sm btn-outline-success" onclick="other.methods.exportTableToExcel('${tableId}', 'DTR_Schedule_${other.methods.formatDate(new Date()).split(' ')[0]}')">
			                    <i class="bi bi-file-earmark-excel"></i> 下載 Excel 表格
			                </button>
			            </div>
			        `;
			    }
			    
			    let voiceHtml = (msg.voiceMetadata) ? `<small class="d-block mt-1 text-info"><i class="bi bi-play-circle"></i> ${msg.voiceMetadata.avmduration}s</small>` : '';
			    let excelHtml = (msg.acmmtype === 'EXCEL') ? `<div class="mt-2"><a href="${msg.acmaurl}" class="btn btn-sm btn-success"><i class="bi bi-file-earmark-excel"></i> 下載排程報表</a></div>` : '';
			    let formattedDate = other.methods.formatDate(msg.acmcat);
			
			    return `
			        <div class="d-flex mb-3">
			            <div class="p-3 rounded shadow-sm ${alignment}" style="max-width: 90%; overflow-wrap: break-word;">
			                ${downloadBtnHtml} 
			                <div class="markdown-body">${formattedContent}</div> 
			                ${voiceHtml}
			                ${excelHtml}
			                <small class="d-block text-end mt-1 opacity-75">${formattedDate}</small>
			            </div>
			        </div>
			    `;
			},
			//新增對話
			newChat() {
			    console.log("newChat() - Resetting session state");
			    
			    // 1. 清空目前追蹤的 Session ID
			    other.data.currentSessionId = null;

			    // 2. UI 重置：移除左側清單的所有選取狀態 (active)
			    $("#aiChatSessionsList .list-group-item").removeClass("active");

			    // 3. UI 重置：清空右側對話框
			    $("#aiChatMessagesBox").html(`
			        <div class="text-center text-muted mt-5">
			            <i class="bi bi-robot" style="font-size: 3rem;"></i>
			            <p class="mt-2">已準備好發起新對話，請選擇上方 AI 模組並輸入問題。</p>
			        </div>
			    `);

			    // 4. 重設上方的 Tag (預設跳回生管 PMC)
			    $("#typeAPMC").prop("checked", true);

			    // 5. 聚焦到輸入框
			    $("#acmContentInput").val("").focus();
			},
			//==========================修改資料==========================
			searchToModify(order) {
				
			},
			searchToCompare(order) {
				
			},
			//==========================傳送資料==========================
			messageSend() {
				console.log("messageSend()");
				let content = $("#acmContentInput").val().trim();
				let bType = $("input[name='acsbtype']:checked").val();
				
				if (content === "") {
			        console.warn("Message content is empty.");
			        return;
			    }
				// 1. 準備請求資料 (符合你後端的 AiChatRequest 物件). 深拷貝範本，避免污染原始 entityFormatJson
			    // 這樣每次發送都是一個乾淨的、基於後端結構的新物件
			    let chatReq = JSON.parse(JSON.stringify(other.data.entityFormatJson));
				console.log(chatReq);
				chatReq['acsid'] = other.data.currentSessionId  || 0; // 如果是新會話，傳 0 或 null
				chatReq['acsbtype'] = bType;//哪個類型AI模塊-生管、物控等代號

				chatReq['aichatmessages'][0]['acmmtype'] = "TEXT";// 預設為文字
				
			    
			 	// 3. 包裝成 PackageBean 格式
			    let data = {
			        entityJson: JSON.stringify(chatReq),
			        callBackFunction: "other_modify" 
			    };
			    let req_data = {
		            data: data,
		            url: $('#nav_functional_unit').attr('title') + ".basil.AC", // AC 通常代表 Action - Create
		            type: "POST",
		            
		        };

		        // 5. UI 互動：清空並聚焦

		        // 6. 模擬前端立即顯示 (Optional: 讓使用者感覺反應很快)
		        // other.methods.appendUserMessage(content);
			        
				// 7. 送出 AJAX
			    console.log("AJAX Sending:", chatReq);
			    main.methods.ajaxSend(req_data, true);
				
				// 8. 清空輸入框並鎖定
				$("#acmContentInput").val("");
			},
			// ========================== 語音功能處理 ==========================
			voiceToggle() {
			    if (!other.data.isRecording) {
			        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
			            // 1. 建立 16000Hz Context (瀏覽器會自動 Resample)
			            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
			            const source = audioContext.createMediaStreamSource(stream);
			            
			            // 雖然 ScriptProcessor 廢棄，但在簡單開發中它是最快實現採樣的方式
			            const processor = audioContext.createScriptProcessor(4096, 1, 1);
			            
			            other.data.audioContext = audioContext;
			            other.data.gumStream = stream;
			            other.data.recBuffers = []; 

			            processor.onaudioprocess = (e) => {
			                const inputData = e.inputBuffer.getChannelData(0);
			                other.data.recBuffers.push(new Float32Array(inputData));
			            };

			            source.connect(processor);
			            processor.connect(audioContext.destination);

			            other.data.isRecording = true;
			            $("#btnVoiceStart").addClass("recording btn-danger").html('<i class="bi bi-stop-fill"></i> 停止');
			        });
			    } else {
			        // 停止錄音
			        if (other.data.gumStream) {
			            other.data.gumStream.getAudioTracks()[0].stop();
			            other.data.audioContext.close();

			            // 2. 呼叫 encodeWAV 產生 16kHz WAV Blob
			            const wavBlob = other.methods.encodeWAV(other.data.recBuffers, 16000);
			            
			            // 3. 直接傳送這個 Blob
			            other.methods.sendAudioToBackend(wavBlob); 
			        }

			        other.data.isRecording = false;
			        $("#btnVoiceStart").removeClass("recording btn-danger").html('<i class="bi bi-mic-fill"></i> 語音');
			    }
			},
			
			// 輔助函式：將採樣數據轉為 WAV 格式
			 encodeWAV(buffers, sampleRate) {
			    let length = buffers.reduce((acc, b) => acc + b.length, 0);
			    let result = new Float32Array(length);
			    let offset = 0;
			    for (let b of buffers) {
			        result.set(b, offset);
			        offset += b.length;
			    }
			
			    const buffer = new ArrayBuffer(44 + result.length * 2);
			    const view = new DataView(buffer);
			
			    const writeString = (view, offset, string) => {
			        for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
			    };
			
			    writeString(view, 0, 'RIFF');
			    view.setUint32(4, 36 + result.length * 2, true);
			    writeString(view, 8, 'WAVE');
			    writeString(view, 12, 'fmt ');
			    view.setUint32(16, 16, true);
			    view.setUint16(20, 1, true);
			    view.setUint16(22, 1, true); // 單聲道
			    view.setUint32(24, sampleRate, true);
			    view.setUint32(28, sampleRate * 2, true);
			    view.setUint16(32, 2, true);
			    view.setUint16(34, 16, true);
			    writeString(view, 36, 'data');
			    view.setUint32(40, result.length * 2, true);
			
			    let index = 44;
			    for (let i = 0; i < result.length; i++) {
			        let s = Math.max(-1, Math.min(1, result[i]));
			        view.setInt16(index, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
			        index += 2;
			    }
			    return new Blob([view], { type: 'audio/wav' });
			},
			// 在 other.methods 裡面新增 Excel 下載
			exportTableToExcel(tableId, fileName) {
			    console.log("exportTableToExcel() - ID:", tableId);
			    
			    // 1. 取得表格元素
			    const table = document.getElementById(tableId);
			    if (!table) {
			        alert("找不到表格資料！");
			        return;
			    }

			    // 2. 使用 XLSX 將 HTML Table 轉換為 Workbook
			    // sheetjs 會自動抓取 <th> 和 <td> 內的文字
			    const wb = XLSX.utils.table_to_book(table, { sheet: "Sheet1" });

			    // 3. 產生 Excel 檔案並觸發下載 (使用了 xlsx 內建的 writeFile)
			    // 也可以結合 FileSaver 的 saveAs
			    XLSX.writeFile(wb, `${fileName}.xlsx`);
			    
			    console.log("Excel 下載指令已送出");
			},
			// ========================== 傳送音訊到後端 ==========================
			sendAudioToBackend(blob) {
			    console.log("sendAudioToBackend() - Processing WAV to Base64");
			    
			    const reader = new FileReader();
			    reader.onloadend = function() {
			        // 取得 Base64 字串
			        const base64Audio = reader.result.split(',')[1];
			        
			        let chatReq = JSON.parse(JSON.stringify(other.data.entityFormatJson));
			        chatReq['acsid'] = other.data.currentSessionId || 0;
			        chatReq['acsbtype'] = $("input[name='acsbtype']:checked").val();
			        
			        // 封裝語音數據
			        chatReq['aichatmessages'][0]['acmmtype'] = "VOICE";
			        chatReq['aichatmessages'][0]['acmaurl'] = base64Audio; 
			        
			        let data = {
			            entityJson: JSON.stringify(chatReq),
			            callBackFunction: "other_modify"
			        };
			        
			        let req_data = {
			            data: data,
			            url: $('#nav_functional_unit').attr('title') + ".basil.AC",
			            type: "POST"
			        };

			        // 發送並顯示等待狀態
			        $("#acmContentInput").val("語音辨識中...").prop("disabled", true);
			        main.methods.ajaxSend(req_data, true);
			        
			        // 發送後恢復輸入框
			        setTimeout(() => {
			            $("#acmContentInput").val("").prop("disabled", false);
			        }, 1000);
			    };
			    
			    reader.readAsDataURL(blob);
			},
			// ========================== 會話管理 ==========================
			sessionListReload() {
				console.log("sessionListReload()");
				// 呼叫後端取得該用戶的所有 AiChatSessions
				let data = { 
					"entityJson": JSON.stringify({ "acsuaccount": "" }),
					callBackFunction: "other_search"
 				};
				let req_data = {
					data: data,
					url: $('#nav_functional_unit').attr('title') + ".basil.AR",
					type: "POST",
				};
				main.methods.ajaxSend(req_data, true);//->取得資料 回傳otherReturn();
			},
			sessionDelete() {
			    console.log("sessionDelete() - Batch Mode");
			    console.log(other.data.entityFormatJson);
			    // 1. 取得所有被勾選的勾選框 (Red Checkboxes)
			    let $checkedItems = $(".session-checkbox:checked");

			    if ($checkedItems.length === 0) {
			        alert("請先勾選要移除的對話紀錄！");
			        return;
			    }

			    // 2. 提取所有勾選的 acsid
			    let selectedIds = [];
			    $checkedItems.each(function() {
			        selectedIds.push(parseInt($(this).val()));
			    });

			    // 3. 安全確認：防止使用者誤刪
			    if (!confirm(`確定要移除這 ${selectedIds.length} 項紀錄嗎？移除後將無法恢復。`)) {
			        return;
			    }

			    // 4. 準備傳送給後端的資料
			    // 我們改傳一個陣列 acsidList，後端透過這個清單執行批次刪除
			    let data = { 
			        "entityJson": JSON.stringify({ 
			            "acsid": selectedIds 
			        }),
			        callBackFunction: "other_other" // 刪除成功後，調用 otherOtherReturn 刷新列表
			    };

			    let req_data = {
			        data: data,
			        url: $('#nav_functional_unit').attr('title') + ".basil.DD",
			        type: "DELETE",
			    };

			    // 5. 送出請求
			    main.methods.ajaxSend(req_data, true);

			    // 6. UI 優化：清空當前對話框（避免顯示已被刪除的內容）
			    $("#aiChatMessagesBox").html("");
			    other.data.currentSessionId = null;
			},
			//==========================資料載入==========================
			otherReturn() {
				//回傳對話紀錄
				console.log("searchReLoad_Start:" + new Date());
				other.methods.sessionListReturn();
				
				console.log("searchReLoad_OK:" + new Date());
			},
			// ==========================回傳接收==========================
			otherOtherReturn(){
				console.log("otherOtherReturn()->移除後再次查詢更新清單");
				// 這裡假設載入時先執行一次查詢歷史列表
				other.methods.sessionListReload();
			},	
			sessionDelete() {
			    console.log("sessionDelete() - Object Batch Mode");
			    
			    // 1. 取得所有勾選的 ID
			    let $checkedItems = $(".session-checkbox:checked");
			    if ($checkedItems.length === 0) {
			        alert("請先勾選要移除的對話紀錄！");
			        return;
			    }

			    let selectedIds = [];
			    $checkedItems.each(function() {
			        selectedIds.push(parseInt($(this).val()));
			    });

			    // 2. 安全確認
			    if (!confirm(`確定要移除這 ${selectedIds.length} 項紀錄嗎？`)) return;

			    // 3. 核心邏輯：依照範例物件格式，封裝成物件陣列
			    // 這樣後端解析時，每一筆都會是一個完整的 AiChatSessions Bean
			    let deleteList = selectedIds.map(id => {
			        // 深拷貝範本物件 (other.data.entityFormatJson)
			        let sessionObj = JSON.parse(JSON.stringify(other.data.entityFormatJson));
			        
			        // 塞入要刪除的 ID (假設對應 Bean 的欄位是 acsid)
			        sessionObj['acsid'] = id;
			        
			        return sessionObj;
			    });

			    // 4. 打包成 PackageBean 格式
			    // 注意：這裡將 Array 直接轉成 JSON 字串放入 entityJson
			    let data = { 
			        "entityJson": JSON.stringify(deleteList),
			        "callBackFunction": "other_other" 
			    };

			    let req_data = {
			        data: data,
			        url: $('#nav_functional_unit').attr('title') + ".basil.DD",
			        type: "DELETE", // 通常 DD 動作在 PackageBean 體系也會用 POST 或依照標籤定義
			    };

			    // 5. 發送 AJAX
			    console.log("Delete Request List:", deleteList);
			    main.methods.ajaxSend(req_data, true);

			    // 6. UI 清理
			    $("#aiChatMessagesBox").html("");
			    other.data.currentSessionId = null;
			},
			otherModifyReturn() {
			    console.log("otherModifyReturn()");
			    // 1. 取得後端回傳的完整 Session
			    let updatedSession = JSON.parse(main.resq_data['entityJson'])[0];
			    let sid = updatedSession.acsid;
			    
			    // 2. 更新全域 ID 與本地緩存數據 (entityJsons)
			    other.data.currentSessionId = sid;
			    let index = other.data.searchPageSet.entityJsons.findIndex(s => s.acsid == sid);
			    
			    if (index !== -1) {
			        other.data.searchPageSet.entityJsons[index] = updatedSession;
			    } else {
			        other.data.searchPageSet.entityJsons.unshift(updatedSession);
			        // 如果是全新會話，還是建議刷一次清單，因為要長出新的 <a> 標籤
			        other.methods.sessionListReturn(); 
			    }
			
			    // 3. 【局部更新左側清單】只改當前這項的文字與時間
			    let $sessionItem = $(`#session_item_${sid}`);
			    if ($sessionItem.length > 0) {
			        // 更新標題 (acstitle)
			        $sessionItem.find("h6").text(updatedSession.acstitle || '新對話');
			        
			        // 更新時間 (格式化後填入)
			        let formattedDate = other.methods.formatDate(updatedSession.acscat);
			        $sessionItem.find("small").text(formattedDate);
			    }
			
			    // 4. 更新右側對話視窗
			    let html = "";
			    updatedSession.aichatmessages.forEach(msg => {
			        html += other.methods.renderMessage(msg);
			    });
			    $("#aiChatMessagesBox").html(html);
			
			    // 5. 自動捲動到底部
			    let box = document.getElementById("aiChatMessagesBox");
			    if(box) box.scrollTop = box.scrollHeight;
			},
			sessionListReturn() {
			    console.log("sessionListReturn()");
			    // 1. 取得原始資料並存入 data 暫存，方便後續直接讀取
			    let sessions = JSON.parse(main.resq_data['entityJson']);
			    other.data.searchPageSet.entityJsons = sessions; 
			    
			    let html = "";
			    sessions.forEach(s => {
			        // --- 時間格式化 ---
			        let formattedDate = other.methods.formatDate(s.acscat);
			        let activeClass = (other.data.currentSessionId == s.acsid) ? "active" : "";

			        html += `
			            <a href="javascript:void(0);" id="session_item_${s.acsid}"
			               class="list-group-item list-group-item-action ${activeClass}" 
			               onclick="other.methods.loadSession(${s.acsid})">
			                <div class="d-flex w-100 justify-content-between">
			                    <h6 class="mb-1 text-truncate" style="max-width: 180px;">${s.acstitle || '新對話'}</h6>
			                    <input type="checkbox" class="session-checkbox form-check-input mt-0 mb-1" 
			                           value="${s.acsid}" 
			                           onclick="event.stopPropagation();"
			                           style="height: 20px; width: 20px;">
			                </div>
			                <div class="d-flex justify-content-between align-items-center">
			                    <small class="opacity-75">${formattedDate}</small>
			                    <span class="badge rounded-pill bg-light text-dark border">${s.acsbtype || ''}</span>
			                </div>
			            </a>`;
			    });
			    $("#aiChatSessionsList").html(html);
			},

			loadSession(id) {
			    console.log("loadSession() Local Mode, ID:", id);
			    other.data.currentSessionId = id;
			    
			    // 更新左側 Active 樣式
			    $("#aiChatSessionsList .list-group-item").removeClass("active");
			    $(`#session_item_${id}`).addClass("active");

			    // 直接執行本地載入
			    other.methods.sessionMessagesReload();
			},

			sessionMessagesReload() {
			    console.log("sessionMessagesReload() - Local Memory Extract");
			    
			    // 1. 從暫存的 entityJsons 中找出符合目前 ID 的那一筆 Session
			    let currentSession = other.data.searchPageSet.entityJsons.find(s => s.acsid == other.data.currentSessionId);
			    
			    if (currentSession && currentSession.aichatmessages) {
			    	// 🌟 【新增：同步切換上方的 Tag 按鈕】
			        if (currentSession.acsbtype) {
			            console.log("切換業務類型至:", currentSession.acsbtype);
			            // 尋找 name 為 acsbtype 且 value 符合的 radio，並設為 checked
			            $(`input[name='acsbtype'][value='${currentSession.acsbtype}']`).prop("checked", true);
			        }
			        let html = "";
			        // 2. 直接渲染該 Session 裡的訊息列表
			        currentSession.aichatmessages.forEach(msg => {
			            html += other.methods.renderMessage(msg);
			        });
			        
			        $("#aiChatMessagesBox").html(html);
			        
			        // 3. 自動捲動到底部
			        let box = document.getElementById("aiChatMessagesBox");
			        if(box) box.scrollTop = box.scrollHeight;
			    } else {
			        $("#aiChatMessagesBox").html('<div class="text-center text-muted mt-5">查無對話內容</div>');
			    }
			},
			// 💡 時間格式:建議抽出來的輔助方法
			formatDate(dateStr) {
			    if (!dateStr) return "無日期";
			    let date = new Date(dateStr);
			    if (isNaN(date.getTime())) return "無日期";
			    const y = date.getFullYear(), 
			          m = String(date.getMonth() + 1).padStart(2, '0'), 
			          d = String(date.getDate()).padStart(2, '0');
			    const hh = String(date.getHours()).padStart(2, '0'), 
			          mm = String(date.getMinutes()).padStart(2, '0');
			    return `${y}-${m}-${d} ${hh}:${mm}`;
			},
			
			//==========================初始化==========================
			destroy() {
				//銷毀
				clearTimeout(other.data.btn_send_auto);
				$(".datetimepicker").remove();
				$("#btnMessageSend").off();
				$("#acmContentInput").off();
				$("#btnVoiceStart").off();
				$("#btnDeleteSession").off();
				$("#btnNewChat").off();

				
				console.log("other_ai_chat.html(destroy)");
			},
		},
	};
</script>
