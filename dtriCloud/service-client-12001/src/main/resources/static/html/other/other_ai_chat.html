<style>

/*覆寫換色*/
.table-hover>tbody>tr:hover>* {
	--bs-table-accent-bg: #0d6efd40;
	color: var(--bs-table-hover-color);
}

/*標題色彩*/
#search_c .title_color {
	background-color: #cfe2ff;
}

/*直立式呈現邊字*/
#search_c .wlr {
	writing-mode: vertical-lr;
	width: 20px;
}

/*checkbox_24*/
#search_c .checkbox_24 {
	width: 24px;
	height: 24px;
}

#search_c .checkbox_20 {
	width: 20px;
	height: 20px;
}

#search_c .checkbox_16 {
	width: 16px;
	height: 16px;
}

#aiChatMessagesBox {
	max-height: calc(100vh - 400px);
	background-image: linear-gradient(to bottom, #f8f9fa, #e9ecef);
}

#aiChatSessionsList {
	max-height: calc(100vh - 315px);
}

#aiChatSessionsList .list-group-item.active {
	background-color: #0d6efd;
	border-color: #0d6efd;
}

/* 讓語音錄音中的樣式 */
.recording {
	background-color: #dc3545 !important;
	animation: pulse 1.5s infinite;
}

/* 讓 Markdown 的列表顯示點點 */
.markdown-body ul, .markdown-body ol {
	padding-left: 1.5rem;
	margin-bottom: 1rem;
}

.markdown-body h3 {
	font-size: 1.1rem;
	font-weight: bold;
	margin-top: 1rem;
}

.markdown-body p {
	margin-bottom: 0.5rem;
}

/* 自定義紅色勾選框 */
.session-checkbox.form-check-input:checked {
	background-color: #dc3545; /* Bootstrap 經典紅色 (danger) */
	border-color: #dc3545;
}

/* 讓勾選框點擊時的陰影也變成淡紅色 */
.session-checkbox.form-check-input:focus {
	border-color: #dc3545;
	box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
}

/* 避免點擊勾選框時觸發 loadSession (這點很重要，否則勾選時會一直重新載入訊息) */
.session-checkbox {
	position: relative;
	z-index: 5;
}

/* 讓 Markdown 產生的表格顯示邊框與間距 */
.markdown-body table {
	width: 100%;
	margin-top: 10px;
	margin-bottom: 15px;
	border-collapse: collapse;
	background-color: white;
	font-size: 0.95rem;
}

.markdown-body table th, .markdown-body table td {
	border: 1px solid #dee2e6;
	padding: 8px 12px;
	text-align: left;
}

.markdown-body table th {
	background-color: #f8f9fa;
	font-weight: bold;
}

.markdown-body table tr:nth-child(even) {
	background-color: #f2f2f2;
}

/* 讓表格在小螢幕也能滾動，不破壞排版 */
.markdown-body {
	overflow-x: auto;
}
/* 下載 Excel 按鈕樣式 */
.btn-outline-success {
	--bs-btn-color: #198754;
	--bs-btn-border-color: #198754;
	--bs-btn-hover-bg: #198754;
	--bs-btn-hover-border-color: #198754;
}

/* 確保表格內的表情符號 (Emoji) 也能正確顯示在下載按鈕旁 */
.markdown-body table {
	position: relative;
}

/* 加入 CSS 讓 AI 的思考過程看起來更專業 */
.markdown-body think {
	display: block;
	color: #6c757d;
	font-style: italic;
	background: #f1f3f5;
	padding: 10px;
	border-left: 3px solid #dee2e6;
	margin-bottom: 10px;
	font-size: 0.9rem;
}
/* 圖片預覽容器 */
#imagePreviewBox {
	display: flex;
	gap: 10px;
	flex-wrap: wrap;
	margin-bottom: 10px;
}

/* 預覽縮圖樣式 */
.preview-img-container {
	position: relative;
	width: 40px;
	height: 40px;
}

.preview-img-container img {
	width: 100%;
	height: 100%;
	object-fit: cover;
	border-radius: 5px;
	border: 1px solid #dee2e6;
}

/* 刪除預覽圖的小按鈕 */
.btn-remove-img {
	position: absolute;
	top: -5px;
	right: -5px;
	background: #dc3545;
	color: white;
	border-radius: 50%;
	width: 20px;
	height: 20px;
	font-size: 12px;
	line-height: 18px;
	text-align: center;
	cursor: pointer;
	border: none;
}

/* 語音播放按鈕動畫 */
.btn-play-voice {
	transition: transform 0.2s;
}

.btn-play-voice:active {
	transform: scale(0.9);
}
/* 相機預覽容器 */
#cameraPreviewContainer {
	position: relative;
	width: 100%;
	max-width: 400px;
	margin: 0 auto;
	background: #000;
	border-radius: 8px;
	overflow: hidden;
}

#videoPreview {
	width: 100%;
	height: auto;
	transform: scaleX(-1); /* 鏡像顯示，符合自拍習慣 */
}

/* 語音勾選框樣式優化 */
.voice-check-label {
	font-size: 0.9rem;
	cursor: pointer;
	user-select: none;
}
</style>

<script type="text/javascript">
	//宣告
	console.log("other_ai_chat.html(init)");
	other = {
		//資料
		data: {
			marks: {},//有選取的IKeyGKey
			markDetails: {},//有選取的IKeyGKey
			entityFormatJson: {},//查詢格式
			btn_send_auto: null,//自動傳送
			selectedImages : [],// 在 other.data 中增加暫存圖片的陣列
			selectedFiles: [], // 🚀 儲存 PDF/Word/Excel 資料
			//換頁設置
			searchPageSet: {
				total: 1000,//批次數量(1-1000)
				batch: 0,//第幾批次(1-1000)
				pageNew: 1,//單前頁碼(1-50)
				pageSize: 20,//每頁數量(1-20)
				entityJsons: [],//資料
				entityDetailJsons: [],//細節資料
				entityIKey: "",//ID
				entityGKey: "",//GID
				entityDateTime: "",//是時間格式的欄位
			},
			searchSet: {},
			// 在 other.data 中加入錄音變數
			mediaRecorder : null,
			audioChunks : [],
		},
		//方法
		methods: {
			create() {
				const style = document.createElement('style');
				style.innerHTML = `
				    @keyframes pulse {
				        0% { opacity: 1; }
				        50% { opacity: 0.5; }
				        100% { opacity: 1; }
				    }
				`;
				document.head.appendChild(style);
				//==========================第一次載入==========================
				//Step0.初始化
				//debugger; 
				console.log("other_ai_chat.html(created)");
				//詢問格式
				other.data.entityFormatJson = JSON.parse(main.resq_data['entityFormatJson']);
				//查詢項目 
				let searchSetJson = JSON.parse(main.resq_data['searchSet']);
				//console.log(searchSetJson);
				//資料內容
				//other.data.searchPageSet.entityJsons = JSON.parse(main.resq_data['entityJson']);
				//other.data.searchPageSet.entityDetailJsons = JSON.parse(main.resq_data['entityDetailJson']);
				other.data.entityIKey = main.resq_data['entityIKeyGKey'].split("_")[0];
				other.data.entityGKey = main.resq_data['entityIKeyGKey'].split("_")[1];
				other.data.entityDateTime = main.resq_data['entityDateTime'];
				other.data.searchSet = searchSetJson['searchSet'];
				//按鈕權限?
				let p = $("#nav_functional_unit").attr("alt").split("<_>")[2];
				let ps = Array.from(p);

				if (ps[10] != 1) {//查詢(AR)10
					$("#btn_send").addClass("disabled");
				} if (ps[9] != 1) {//修改(AU)9
					$("#btn_modify").addClass("disabled");
				} if (ps[8] != 1) {//新增(AC)8
					$("#btn_create").addClass("disabled");
					$("#btn_saveAs").addClass("disabled");
				} if (ps[7] != 1) {//作廢(AD)7
					$("#btn_invalid").addClass("disabled");
				} if (ps[6] != 1) {//移除(DD)6
					$("#btn_delete").addClass("disabled");
				}

				
				//時間格式
				other.methods.datetimepickerDate();
				
				// [取得紀錄/載入會話]
				// 這裡假設載入時先執行一次查詢歷史列表
				other.methods.sessionListReload();
				
				// Step2. 監聽器綁定
				// [送出按鈕]
				$("#btnMessageSend").off().on("click", function() {
					other.methods.messageSend();
				});
				// [輸入框 Enter 送出]
				$("#acmContentInput").off().on("keypress", function(e) {
					if(e.which == 13 && !e.shiftKey) {
						e.preventDefault();
						other.methods.messageSend();
					}
				});
				// [語音按鈕] (暫時模擬錄音切換)
				$("#btnVoiceStart").off().on("click", function() {
					other.methods.voiceToggle();
				});

				// [移除紀錄]
				$("#btnDeleteSession").off().on("click", function() {
					if(confirm("確定要移除此對話紀錄嗎？")) {
						other.methods.sessionDelete();
					}
				});
				// 在 create() 的監聽器綁定區加入：
				$("#btnNewChat").off().on("click", function() {
				    other.methods.newChat();
				});
				
				// 🚀 需求 2：點擊分頁時觸發 +New
			    $("#aiAcsBTypeGroup input[name='acsbtype']").on("change", function() {
			        console.log("切換 AI 模組，重置對話...");
			        other.methods.newChat();
			    });

			    // 🚀 需求 1：檔案上傳處理
			    $("#btnFileUpload").on("click", () => $("#fileInput").click());
			    $("#fileInput").on("change", function(e) {
			        const files = Array.from(e.target.files);
			        files.forEach(file => {
			            const reader = new FileReader();
			            reader.onload = function(event) {
			                // 將檔案存入 data (包含檔名與 Base64)
			                other.data.selectedFiles.push({
			                    name: file.name,
			                    base64: event.target.result.split(',')[1],
			                    type: file.type
			                });
			                other.methods.renderFilePreviews(); // 渲染檔案小圖示
			            };
			            reader.readAsDataURL(file);
			        });
			        $(this).val(""); 
			    });
				
				

				// 綁定圖片按鈕
				$("#btnImageUpload").on("click", () => $("#imageInput").click());

				// 處理檔案選取
				$("#imageInput").on("change", function(e) {
				    const files = Array.from(e.target.files);
				    
				    // 檢查總數是否超過 5 張
				    if (other.data.selectedImages.length + files.length > 5) {
				        alert("最多只能上傳 5 張圖片！");
				        return;
				    }

				    files.forEach(file => {
				        const reader = new FileReader();
				        reader.onload = function(event) {
				            const base64 = event.target.result;
				            other.data.selectedImages.push(base64);
				            other.methods.renderImagePreviews();
				        };
				        reader.readAsDataURL(file);
				    });
				    $(this).val(""); // 清空 input 以便重複選取
				});
				// [相機按鈕點擊]
				$("#btnCamera").off().on("click", function() {
				    other.methods.cameraOpen();
				});

				// [拍照按鈕點擊]
				$("#btnCapture").off().on("click", function() {
				    other.methods.cameraCapture();
				});

				// [Modal 關閉時停止攝影機]
				$('#cameraModal').on('hidden.bs.modal', function () {
				    other.methods.cameraStop();
				});
				
				
			},
			// 渲染預覽圖
			renderImagePreviews () {
			    const $box = $("#imagePreviewBox");
			    if (other.data.selectedImages.length > 0) {
			        $box.removeClass("d-none");
			        let html = "";
			        other.data.selectedImages.forEach((img, index) => {
			            html += `
			                <div class="preview-img-container">
			                    <img src="${img}">
			                    <button class="btn-remove-img" onclick="other.methods.removeImage(${index})">×</button>
			                </div>`;
			        });
			        $box.html(html);
			    } else {
			        $box.addClass("d-none");
			    }
			},

			// 移除單張圖片
			removeImage(index) {
			    other.data.selectedImages.splice(index, 1);
			    other.methods.renderImagePreviews();
			},
			renderFilePreviews() {
			    const $box = $("#imagePreviewBox"); // 複用圖片預覽盒
			    // 先清空再重新渲染 (包含圖片與檔案)
			    $box.removeClass("d-none").html("");
			    
			    // 渲染圖片
			    other.data.selectedImages.forEach((img, index) => {
			        $box.append(`
			            <div class="preview-img-container">
			                <img src="${img}">
			                <button class="btn-remove-img" onclick="other.methods.removeImage(${index})">×</button>
			            </div>`);
			    });

			    // 🚀 渲染檔案圖示
			    other.data.selectedFiles.forEach((file, index) => {
			        let icon = "bi-file-earmark-text";
			        if(file.name.includes("pdf")) icon = "bi-file-earmark-pdf text-danger";
			        if(file.name.includes("xls")) icon = "bi-file-earmark-excel text-success";
			        if(file.name.includes("doc")) icon = "bi-file-earmark-word text-primary";

			        $box.append(`
			            <div class="preview-img-container border bg-light d-flex align-items-center justify-content-center" title="${file.name}">
			                <i class="bi ${icon}" style="font-size: 1.5rem;"></i>
			                <button class="btn-remove-img" onclick="other.methods.removeFile(${index})">×</button>
			            </div>`);
			    });

			    if(other.data.selectedImages.length === 0 && other.data.selectedFiles.length === 0) {
			        $box.addClass("d-none");
			    }
			},

			removeFile(index) {
			    other.data.selectedFiles.splice(index, 1);
			    other.methods.renderFilePreviews();
			},
			
			datetimepickerDate() {
				//日期時間格式
				$('#search_c_item .datetimepicker').remove();
				$('#search_c_item .datetimepicker_date:not(:disabled)').datetimepicker({
					format: 'yyyy-mm-dd',
					pickerPosition: 'bottom-right',
					startView: 2,    // 2 = month view（年/月/日）
				    minView: 2,      // 2 = 最小停在「日」
				    autoclose: true,
				    endDate: '+1d',
				    datesDisabled: '+1d',
				    todayBtn: true,
				    bootcssVer: 5
					//......可以同上項目代碼自定義設置
				});
				$('#search_c_item .datetimepicker_datetime:not(:disabled)').datetimepicker({
					format: 'yyyy-mm-dd hh:ii:00',
					pickerPosition: 'bottom-right',
					//minView:1,
					// hoursDisabled: [00, 1, 2, 3, 4, 5, 6],
					minuteStep: 30,
					autoclose: true,
					endDate: '+1d',
					datesDisabled: '+1d',
					todayBtn: true,
					bootcssVer: 5,

			// ========================== 語音功能處理 ==========================
			voiceToggle() {
			    if (!other.data.isRecording) {
			        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
			            // 1. 建立 16000Hz Context (瀏覽器會自動 Resample)
			            const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
			            const source = audioContext.createMediaStreamSource(stream);
			            
			            // 雖然 ScriptProcessor 廢棄，但在簡單開發中它是最快實現採樣的方式
			            const processor = audioContext.createScriptProcessor(4096, 1, 1);
			            
			            other.data.audioContext = audioContext;
			            other.data.gumStream = stream;
			            other.data.recBuffers = []; 

			            processor.onaudioprocess = (e) => {
			                const inputData = e.inputBuffer.getChannelData(0);
			                other.data.recBuffers.push(new Float32Array(inputData));
			            };

			            source.connect(processor);
			            processor.connect(audioContext.destination);

			            other.data.isRecording = true;
			            $("#btnVoiceStart").addClass("recording btn-danger").html('<i class="bi bi-stop-fill"></i> 停止');
			        });
			    } else {
			        // 停止錄音
			        if (other.data.gumStream) {
			            other.data.gumStream.getAudioTracks()[0].stop();
			            other.data.audioContext.close();

			            // 2. 呼叫 encodeWAV 產生 16kHz WAV Blob
			            const wavBlob = other.methods.encodeWAV(other.data.recBuffers, 16000);
			            
			            // 3. 直接傳送這個 Blob
			            other.methods.sendAudioToBackend(wavBlob); 
			        }

			        other.data.isRecording = false;
			        $("#btnVoiceStart").removeClass("recording btn-danger").html('<i class="bi bi-mic-fill"></i> 語音');
			    }
			},
			
			// 輔助函式：將採樣數據轉為 WAV 格式
			 encodeWAV(buffers, sampleRate) {
			    let length = buffers.reduce((acc, b) => acc + b.length, 0);
			    let result = new Float32Array(length);
			    let offset = 0;
			    for (let b of buffers) {
			        result.set(b, offset);
			        offset += b.length;
			    }
			
			    const buffer = new ArrayBuffer(44 + result.length * 2);
			    const view = new DataView(buffer);
			
			    const writeString = (view, offset, string) => {
			        for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
			    };
			
			    writeString(view, 0, 'RIFF');
			    view.setUint32(4, 36 + result.length * 2, true);
			    writeString(view, 8, 'WAVE');
			    writeString(view, 12, 'fmt ');
			    view.setUint32(16, 16, true);
			    view.setUint16(20, 1, true);
			    view.setUint16(22, 1, true); // 單聲道
			    view.setUint32(24, sampleRate, true);
			    view.setUint32(28, sampleRate * 2, true);
			    view.setUint16(32, 2, true);
			    view.setUint16(34, 16, true);
			    writeString(view, 36, 'data');
			    view.setUint32(40, result.length * 2, true);
			
			    let index = 44;
			    for (let i = 0; i < result.length; i++) {
			        let s = Math.max(-1, Math.min(1, result[i]));
			        view.setInt16(index, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
			        index += 2;
			    }
			    return new Blob([view], { type: 'audio/wav' });
			},
			// 在 other.methods 裡面新增 Excel 下載
			exportTableToExcel(tableId, fileName) {
			    console.log("exportTableToExcel() - ID:", tableId);

			    const table = document.getElementById(tableId);

			    // 2. 使用 XLSX 將 HTML Table 轉換為 Workbook
			    // sheetjs 會自動抓取 <th> 和 <td> 內的文字
			    const wb = XLSX.utils.table_to_book(table, { sheet: "Sheet1" });

			    // 3. 產生 Excel 檔案並觸發下載 (使用了 xlsx 內建的 writeFile)
			    // 也可以結合 FileSaver 的 saveAs
			    XLSX.writeFile(wb, `${fileName}.xlsx`);

			sendAudioToBackend(blob) {

			// 💡 時間格式:建議抽出來的輔助方法
			formatDate(dateStr) {
			    if (!dateStr) return "無日期";
			    let date = new Date(dateStr);
			    if (isNaN(date.getTime())) return "無日期";
			    const y = date.getFullYear(), 
			          m = String(date.getMonth() + 1).padStart(2, '0'), 
			          d = String(date.getDate()).padStart(2, '0');
			    const hh = String(date.getHours()).padStart(2, '0'), 
			          mm = String(date.getMinutes()).padStart(2, '0');
			    return `${y}-${m}-${d} ${hh}:${mm}`;
			},
			
			//==========================初始化==========================
			destroy() {
				//銷毀
				clearTimeout(other.data.btn_send_auto);
				$(".datetimepicker").remove();
				$("#btnMessageSend").off();
				$("#acmContentInput").off();
				$("#btnVoiceStart").off();
				$("#btnDeleteSession").off();
				$("#btnNewChat").off();

				
				console.log("other_ai_chat.html(destroy)");
			},
		},
	};
</script>
